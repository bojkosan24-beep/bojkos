<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Realm - Контакти </title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="contact">
    <header>
        <nav>
            <div class="logo">Pixel Realm</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Головна</a></li>
                <li><a href="games.html">Ігри</a></li>
                <li><a href="news.html">Новини</a></li>
                <li><a href="contact.html">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <main> <br> 
        <section class="contact-section"> <br> 
            <h1>Зв'яжіться з нами</h1>
            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Ім'я</label>
                    <input type="text" id="name" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Тема</label>
                    <select id="subject" required>
                        <option value="">Оберіть тему</option>
                        <option value="feedback">Відгук</option>
                        <option value="suggestion">Пропозиція</option>
                        <option value="bug">Повідомити про помилку</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Повідомлення</label>
                    <textarea id="message" rows="6" required></textarea>
                </div>
                <button type="submit" class="btn primary">Надіслати</button>
            </form>
        </section>
    </main>

     <footer class="foot">
        <p>&copy; 2026 Pixel Realm. Усі права захищені.</p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (this.checkVisibility()) {
                alert('Дякуємо! Повідомлення надіслано');
                this.reset();
            }
        })
    </script>
    </body>
    </html>
